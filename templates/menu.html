{% extends "base.html" %}

{% block title %}Menu{% endblock %}

{% block content %}
<section class="products-section" style="padding-top: 40px;">
    <h1 style="text-align: center; color: var(--primary-color);">Product Menu by Categories</h1>
        <select id="categoryFilter" style="padding: 10px; font-size: 1.1rem; border-radius: 4px; border: 1px solid #ccc;">
            <option value="">All Categories</option>
            <option value="Electronics">Electronics</option>
            <option value="Cameras">Cameras</option>
            <option value="Home">Home</option>
            <option value="Accessories">Accessories</option>
            <option value="Sports">Sports</option>
            <option value="Fashion">Fashion</option>
            <option value="Smart Home">Smart Home</option>
        </select>
    </div>
    
    <div class="product-grid" id="productGrid">
        <div class="loading-spinner">Loading products...</div>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const categoryFilter = document.getElementById('categoryFilter');
        if (categoryFilter) {
            categoryFilter.addEventListener('change', async (e) => {
                const category = e.target.value;
                const endpoint = category ? `/api/products?category=${encodeURIComponent(category)}` : '/api/products';
                const productGrid = document.getElementById('productGrid');
                
                // Update dataset endpoint so search from main.js maintains the category filter
                productGrid.dataset.endpoint = endpoint;
                
                try {
                    productGrid.innerHTML = '<div class="loading-spinner">Loading...</div>';
                    const response = await fetch(endpoint);
                    const filteredProducts = await response.json();
                    
                    productGrid.innerHTML = '';
                    if (filteredProducts.length === 0) {
                        productGrid.innerHTML = '<div style="grid-column: 1 / -1; text-align: center;">No products in this category.</div>';
                        return;
                    }
                    
                    filteredProducts.forEach(product => {
                        const card = document.createElement('div');
                        card.className = 'product-card';
                        
                        const formattedPrice = `₹${product.price.toLocaleString('en-IN', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
                        
                        card.innerHTML = `
                            <img src="${product.image_url}" alt="${product.name}" class="product-image">
                            <h3 class="product-title">${product.name}</h3>
                            <div class="product-price">${formattedPrice}</div>
                            <div class="product-desc">${product.description}</div>
                            <button class="btn btn-primary btn-block" onclick="window.addToCart(${product.id})">
                                Add to Cart
                            </button>
                        `;
                        productGrid.appendChild(card);
                    });
                } catch (error) {
                    console.error('Error fetching categories:', error);
                }
            });
        }
    });
</script>
{% endblock %}
